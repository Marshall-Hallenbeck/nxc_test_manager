services:
  postgres:
    image: postgres:17-alpine
    container_name: netexec-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: netexec_tests
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netexec-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: netexec-backend
    dns:
      - 192.168.8.1
      - 8.8.8.8
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/netexec_tests
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.local/share/claude/versions:/opt/claude/versions:ro
      - ~/.claude:/root/.claude
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: netexec-celery-worker
    command: celery -A app.tasks worker --loglevel=info --concurrency=3
    dns:
      - 192.168.8.1
      - 8.8.8.8
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/netexec_tests
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    container_name: netexec-frontend
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: netexec-nginx
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
