services:
  postgres:
    image: postgres:17-alpine
    container_name: netexec-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: netexec_tests
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netexec-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  empire:
    image: bcsecurity/empire:latest
    container_name: netexec-empire
    ports:
      - "1337:1337"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1337/"]
      interval: 10s
      timeout: 5s
      retries: 15

  empire-init:
    image: curlimages/curl:latest
    container_name: netexec-empire-init
    depends_on:
      empire:
        condition: service_healthy
    volumes:
      - ./docker/empire-init/init-listener.sh:/init-listener.sh:ro
    entrypoint: ["sh", "/init-listener.sh", "netexec-empire", "1337"]

volumes:
  postgres_data:
  redis_data:
